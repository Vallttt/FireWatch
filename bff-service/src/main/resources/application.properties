server.port=8001
spring.application.name=bff-vallesol

# =====================================================
# URLs de los Microservicios (acceso directo, sin Eureka)
# En Docker se sobreescriben con variables de entorno
# =====================================================
ms.auth.url=http://localhost:8080
ms.reportes.url=http://localhost:8081
services.geo.url=${MS_GEO_URL:http://localhost:8082}
services.user.url=${MS_USER_URL:http://localhost:8085}
services.zone.url=${MS_ZONE_URL:http://localhost:8086}
services.brigade.url=${MS_BRIGADE_URL:http://localhost:8087}

# =====================================================
# Eureka — service discovery para alert-service y notification-service
# En Docker se sobreescribe con EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=false

# Activar Apache HttpClient 5 para que Feign pueda usar PATCH
spring.cloud.openfeign.httpclient.hc5.enabled=true

# Permitir cargas de medios grandes reenviadas desde los frontends
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB
