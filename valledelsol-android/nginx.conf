server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Angular routing — todas las rutas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso — redirige /api y /auth al API Gateway
    location /api/ {
        proxy_pass http://gateway-app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://gateway-app:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
