spring.application.name=reportes
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/report_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

geo.service.url=http://localhost:8082
alertas.service.url=http://localhost:8083

# Allow large media uploads (photos / videos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB
