spring.application.name=evidencias
server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/evidence_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# permite uploads de archivos grandes (photos / videos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB
