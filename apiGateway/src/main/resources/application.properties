server.port=8000
spring.application.name=api-gateway

# CORS - permite requests desde el frontend Angular (web y Android)
# - localhost:8100 / localhost:4200 : desarrollo web local
# - 192.168.1.142:8100             : live-reload en dispositivo Android (misma red)
# - capacitor://localhost           : APK bundleado (Capacitor Android WebView)
# - http://localhost                : Capacitor HTTP fallback
# CORS — acepta cualquier origen (web, Capacitor Android/iOS, emulador)
# allowedOriginPatterns=* es compatible con allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
