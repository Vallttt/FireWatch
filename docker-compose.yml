version: '3.8'

services:
  # 1. Base de Datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: valledelsol-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: solalertas_db
    ports:
      - "3307:3306"
    networks:
      - red-municipalidad
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. Microservicio de Alertas
  solalertas-app:
    build:
      context: ./SolAlertas
      dockerfile: Dockerfile
    container_name: solalertas-microservice
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/solalertas_db?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=60000
    networks:
      - red-municipalidad

  # 3. API Gateway
  gateway-app:
    build:
      context: ./apiGateway
      dockerfile: Dockerfile
    container_name: municipalidad-gateway
    ports:
      - "8000:8000"
    depends_on:
      - solalertas-app
    environment:
      - SPRING_CLOUD_GATEWAY_ROUTES_0_ID=ms-alertas
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://solalertas-app:8080
      - SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0=Path=/api/alertas/**
    networks:
      - red-municipalidad

networks:
  red-municipalidad:
    driver: bridge