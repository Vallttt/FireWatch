services:

  # ============================================================
  # BASE DE DATOS — MySQL
  # ============================================================
  mysql-db:
    image: mysql:8.0
    container_name: valledelsol-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - red-municipalidad
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p123456 --silent"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  # ============================================================
  # SERVICE REGISTRY — Eureka Server (:8761)
  # ============================================================
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: valledelsol-eureka
    ports:
      - "8761:8761"
    networks:
      - red-municipalidad
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ============================================================
  # MICROSERVICIO — Auth Service (:8080)
  # ============================================================
  auth-app:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: valledelsol-auth
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
      user-app:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/auth_vallesol_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICES_USER_URL=http://user-app:8084
    networks:
      - red-municipalidad

  # ============================================================
  # MICROSERVICIO — User Service (:8084)
  # ============================================================

  user-app:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: valledelsol-user
    ports:
      - "8084:8084"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/user_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - BREVO_SMTP_USER=${BREVO_SMTP_USER}
      - BREVO_SMTP_KEY=${BREVO_SMTP_KEY}
    networks:
      - red-municipalidad

  # ============================================================
  # MICROSERVICIO — Report Service (:8081)
  # ============================================================
  report-app:
    build:
      context: ./report-service
      dockerfile: Dockerfile
    container_name: valledelsol-reportes
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/report_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - GEO_SERVICE_URL=http://geo-app:8082
      - ALERTAS_SERVICE_URL=http://alertas-app:8083
    networks:
      - red-municipalidad

  # ============================================================
  # MICROSERVICIO — Geo Service (:8082)
  # ============================================================
  geo-app:
    build:
      context: ./geo-service
      dockerfile: Dockerfile
    container_name: valledelsol-geo
    ports:
      - "8082:8082"
    depends_on:
      mysql-db:
        condition: service_healthy
      zone-app:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/geo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - red-municipalidad

