server.port=8001
spring.application.name=bff-vallesol

# =====================================================
# URLs de los Microservicios
# En Docker se sobreescriben con variables de entorno:
#   MS_AUTH_URL, MS_REPORTES_URL, MS_GEO_URL, MS_ALERTAS_URL
# =====================================================
ms.auth.url=http://localhost:8080
ms.reportes.url=http://localhost:8081
ms.geo.url=http://localhost:8082
ms.alertas.url=http://localhost:8083
services.user.url=${MS_USER_URL}

# Activar Apache HttpClient 5 para que Feign pueda usar PATCH
# (java.net.HttpURLConnection no soporta PATCH de forma nativa)
spring.cloud.openfeign.httpclient.hc5.enabled=true

# Permitir cargas de medios grandes reenviadas desde los frontends
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB
